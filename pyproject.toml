[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "minppt"
version = "0.1.0"
description = "Minimal PowerPoint clone"
requires-python = ">=3.10"
dependencies = [
    "PyQt6>=6.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
]

[tool.setuptools.packages.find]
include = ["minppt*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
